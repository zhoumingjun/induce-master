version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - JWT_SECRET=your-secret-key
      - DB_PATH=induce_master.db
    volumes:
      - ./prod/backend/induce_master.db:/app/induce_master.db
    restart: unless-stopped

  frontend:
    build:
      context: ./prod/frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
